services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    platform: linux/amd64
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJJSjQ2Ng=="
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    platform: linux/amd64
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment123
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  producer:
    build:
      context: ./producer
    container_name: payment-producer
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: payments
      KAFKA_PARTITIONS: 3
      ENABLE_AUTO_EVENTS: "false"

  consumer-processor:
    build:
      context: ./consumer-processor
    container_name: payment-consumer-processor
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: payments
      KAFKA_GROUP_ID: payment-processor-group
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment123
      POSTGRES_DB: payment_db

  consumer-notification:
    build:
      context: ./consumer-notification
    container_name: payment-consumer-notification
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: payments
      KAFKA_GROUP_ID: notification-group
      REDIS_HOST: redis
      REDIS_PORT: 6379

  consumer-analytics:
    build:
      context: ./consumer-analytics
    container_name: payment-consumer-analytics
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: payments
      KAFKA_GROUP_ID: analytics-group
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment123
      POSTGRES_DB: payment_db

  ui:
    build:
      context: ./ui
    container_name: payment-ui
    ports:
      - "3000:80"
    depends_on:
      - producer
      - consumer-processor
      - consumer-analytics

volumes:
  postgres-data:
  redis-data:
